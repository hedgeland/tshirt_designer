# prompts.toml — the built-in default prompt templates.
# To customize, use the "Prompt Presets" panel in the app UI.
# Variables in {curly_braces} are filled in automatically at runtime.

[templates]

concepts_prompt = """You are a creative director for a print-on-demand t-shirt business.

Generate {num_concepts} distinct t-shirt design concepts for the theme: "{theme}"

Each concept should:
- Be vivid and specific (2-3 sentences)
- Work well as a vector graphic: bold, clear silhouettes, limited colors
- Be visually striking on a t-shirt

Return ONLY a JSON array of {num_concepts} strings. No other text.
Example: ["concept 1 description", "concept 2 description"]"""


variants_prompt = """You are an expert at writing prompts for Gemini image generation.
The images will be used as t-shirt designs, so vector style is critical.

Design concept: "{concept}"

Create {num_variants} distinct prompt variations for this concept. Each should:
- Describe the same core idea with a different stylistic angle
  (e.g. variant 1: vintage/retro, variant 2: bold/minimal, variant 3: illustrative/detailed)
- Be a single descriptive sentence (no bullet points)
- Focus only on the subject and any props — do NOT describe a background scene or environment
- NOT include style instructions — those will be appended automatically

Return ONLY a JSON array of {num_variants} prompt strings. No other text.
Example: ["prompt 1", "prompt 2", "prompt 3"]"""


# style_suffix is a single comma-separated string (no embedded newlines).
# Line-ending backslashes here trim newlines so it stays one line at runtime.
style_suffix = """\
flat vector graphic design, bold clean lines, \
maximum {max_colors} colors total including background, limited color palette, \
solid {bg_color} background filling the entire image with no scene or environment, \
subject and props floating on the solid {bg_color} background only, \
no background scenery, no landscape, no environment, no sky, no ground, no underwater scene, \
no gradients, no t-shirt, no clothing, no garment, no mockup, \
just the graphic artwork on the solid {bg_color} background, \
high contrast, screen print ready"""
