<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Design Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Base theme — processed by Tailwind Play CDN. @layer base has lower specificity
         than utilities, so any explicit class (e.g. bg-slate-600) still wins. -->
    <style type="text/tailwindcss">
        @layer base {
            /* All step cards use the same dark card background. */
            section {
                @apply bg-slate-700;
            }

            /* Text inputs, textareas, and selects: light on dark. Exclude special inputs. */
            input:not([type="color"]):not([type="range"]):not([type="radio"]):not([type="checkbox"]),
            textarea,
            select {
                @apply bg-slate-100 text-slate-800;
            }

            /* Labels default to the light-on-dark color. The modal overrides with
               explicit text-slate-500/700 classes where needed. */
            label {
                @apply text-slate-100;
            }
        }
    </style>

    <style>
        [x-cloak] {
            display: none !important;
        }

        /* Range input */
        input[type="range"] {
            accent-color: #818cf8;
            cursor: pointer;
            width: 100%;
        }

        /* Color input */
        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            padding: 0;
            cursor: pointer;
            border-radius: 6px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }

        input[type="color"]::-moz-color-swatch {
            border: none;
            border-radius: 6px;
        }
    </style>
</head>

<body class="bg-slate-800 text-slate-100" x-data="designer()" x-cloak>

    <div class="h-screen flex flex-col">

        <!-- ── Header ──────────────────────────────────────────────────────────── -->
        <header class="bg-slate-700 border-b border-slate-200 px-5 py-3 flex items-center gap-4 flex-shrink-0">
            <span class="text-xl" aria-hidden="true">👕</span>
            <div class="min-w-0">
                <h1 class="text-base font-semibold leading-tight">T-Shirt Design Generator</h1>
                <p class="text-xs text-slate-300">Brainstorm → Select → Generate · Gemini 3.1 Flash Image Preview</p>
            </div>
            <!-- Column controls — immediately right of app name -->
            <div class="flex items-center gap-3 flex-shrink-0">
                <label class="flex items-center gap-1.5 text-xs text-slate-300">
                    Min columns
                    <input type="number" x-model.number="minColumns" min="1" :max="maxColumns" step="1"
                        @change="updateMinColumns()" aria-label="Minimum number of columns"
                        class="w-14 text-center border border-slate-500 rounded px-1.5 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400">
                </label>
                <label class="flex items-center gap-1.5 text-xs text-slate-300">
                    Max columns
                    <input type="number" x-model.number="maxColumns" min="1" :max="cfg.maxColumns" step="1"
                        @change="updateMaxColumns()" aria-label="Maximum number of columns"
                        class="w-14 text-center border border-slate-500 rounded px-1.5 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400">
                </label>
                <button @click="addColumn()" :disabled="columns.length >= maxColumns" title="Add a new design column"
                    class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                    <span aria-hidden="true">＋</span> Add Column
                </button>
            </div>
        </header>

        <!-- ── Body: columns + output browser ─────────────────────────────────── -->
        <!-- relative wrapper so the output browser can use absolute positioning -->
        <div class="relative flex-1 overflow-hidden">

            <!-- ── Presets Panel — left-side panel ────────────────────────────── -->
            <div x-data="{ presetsPinned: false }"
                class="absolute top-0 left-0 h-full z-20 overflow-hidden opacity-95 transition-[width] duration-200"
                :style="`width: ${showPresetsPanel ? 460 : 30}px`"
                @mouseenter="showPresetsPanel = true"
                @mouseleave="if (!presetsPinned && $event.clientX > 0) closePresetsPanel(true)"

                <!-- Tab handle — rounded right, sticks out toward columns -->
                <div class="absolute top-1/2 -translate-y-1/2 w-5 h-14 bg-slate-700 border border-l-0 border-slate-600 rounded-r-lg flex items-center justify-center cursor-pointer opacity-95 z-10"
                    :style="`right: ${showPresetsPanel ? 0 : 10}px`" aria-hidden="true">
                    <span class="text-slate-400 text-[10px] select-none" x-text="showPresetsPanel ? '‹' : '›'"></span>
                </div>

                <!-- Drawer panel -->
                <div x-show="showPresetsPanel" x-transition.opacity @click.outside="closePresetsPanel()"
                    class="absolute top-0 left-0 h-full flex flex-col bg-slate-700 shadow-2xl" style="width: 440px"
                    role="dialog" aria-modal="true" aria-labelledby="presets-drawer-title">

                    <!-- Header -->
                    <div class="flex items-center gap-2 px-4 py-3 border-b border-slate-600 flex-shrink-0">
                        <button @click="presetsPinned = !presetsPinned"
                            :title="presetsPinned ? 'Unpin panel' : 'Pin panel open'" :aria-pressed="presetsPinned"
                            class="flex items-center justify-center w-6 h-6 rounded transition-colors"
                            :class="presetsPinned ? 'text-indigo-400 bg-indigo-900/50 hover:bg-indigo-900' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-600'">
                            <span class="text-sm leading-none" x-text="presetsPinned ? '📌' : '📍'"></span>
                        </button>
                        <span class="text-base" aria-hidden="true">🗂</span>
                        <h2 id="presets-drawer-title" class="text-sm font-semibold flex-1">Prompt Presets</h2>
<button @click="closePresetsPanel()" aria-label="Close presets panel" title="Close"
                            class="text-slate-400 hover:text-slate-200 transition-colors text-lg leading-none">✕</button>
                    </div>

                    <!-- Unsaved changes warning -->
                    <div x-show="presetsHasChanges"
                        class="px-4 py-2 bg-amber-900/50 border-b border-amber-700 flex-shrink-0">
                        <p class="text-xs text-amber-300">Unsaved changes — save before closing.</p>
                    </div>

                    <!-- Content -->
                    <div class="flex-1 overflow-y-auto p-4 space-y-4">
                        <!-- Preset selector -->
                        <div>
                            <label class="text-xs font-medium block mb-1">Active preset</label>
                            <select x-model="presetsActive" @change="loadPresetToPanel($event.target.value)"
                                class="w-full text-xs border border-slate-500 rounded-md px-2 py-1.5 bg-slate-800 text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                <template x-for="name in sortedPresetsNames" :key="name">
                                    <option :value="name" x-text="name + (name === userDefaultPreset ? ' ★' : '')"></option>
                                </template>
                            </select>
                            <!-- Default toggle — lets user nominate any preset as their startup default -->
                            <label class="flex items-center gap-2 mt-2 cursor-pointer select-none w-fit">
                                <input type="checkbox" :checked="presetsActive === userDefaultPreset"
                                    @change="toggleUserDefault()"
                                    class="accent-indigo-500 w-3.5 h-3.5">
                                <span class="text-xs text-slate-300">My default</span>
                                <span x-show="presetsActive === userDefaultPreset" class="text-xs text-indigo-400">★ loads on startup</span>
                            </label>
                        </div>
                        <!-- Template editors -->
                        <div>
                            <label class="text-xs font-medium block mb-1">Brainstorm prompt</label>
                            <textarea x-model="panelConceptsTemplate" rows="5"
                                class="w-full text-xs font-mono border border-slate-500 rounded-md p-2 bg-slate-800 text-slate-100 resize-y focus:outline-none focus:ring-1 focus:ring-indigo-400"></textarea>
                        </div>
                        <div>
                            <label class="text-xs font-medium block mb-1">Variants prompt</label>
                            <textarea x-model="panelVariantsTemplate" rows="5"
                                class="w-full text-xs font-mono border border-slate-500 rounded-md p-2 bg-slate-800 text-slate-100 resize-y focus:outline-none focus:ring-1 focus:ring-indigo-400"></textarea>
                        </div>
                        <div>
                            <label class="text-xs font-medium block mb-1">Style suffix</label>
                            <textarea x-model="panelStyleTemplate" rows="3"
                                class="w-full text-xs font-mono border border-slate-500 rounded-md p-2 bg-slate-800 text-slate-100 resize-y focus:outline-none focus:ring-1 focus:ring-indigo-400"></textarea>
                        </div>
                        <!-- Save / Delete -->
                        <div class="flex gap-1.5 items-center">
                            <input type="text" x-model="presetsNewName" placeholder="New preset name"
                                @keydown.enter="savePresetFromPanel()"
                                class="flex-1 min-w-0 text-xs border border-slate-500 rounded-md px-2 py-1.5 bg-slate-800 text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                            <button @click="savePresetFromPanel()"
                                :disabled="!panelConceptsTemplate.trim() || !panelVariantsTemplate.trim() || !panelStyleTemplate.trim()"
                                class="text-xs px-2.5 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed">Save</button>
                            <button @click="deletePresetFromPanel()"
                                :disabled="presetsActive === cfg.builtinName"
                                class="text-xs px-2.5 py-1.5 bg-red-900 text-red-200 rounded-md hover:bg-red-800 transition-colors whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed">Delete</button>
                        </div>
                        <p x-show="!panelConceptsTemplate.trim() || !panelVariantsTemplate.trim() || !panelStyleTemplate.trim()"
                            class="text-xs text-amber-400">Prompt fields cannot be blank.</p>
                        <p x-show="presetsStatus" x-text="presetsStatus" role="status" aria-live="polite"
                            class="text-xs text-slate-300"></p>
                    </div>

                </div><!-- /drawer panel -->
            </div><!-- /presets wrapper -->

            <!-- ── Output Browser — right-side panel ──────────────────────────── -->
            <div x-data="{ browserPinned: false }"
                class="absolute top-0 right-0 h-full z-20 overflow-hidden opacity-95 transition-[width] duration-200"
                :style="`width: ${showBrowser ? 500 : 30}px`"
                @mouseenter="showBrowser = true; if (browserThemes.length === 0) reloadBrowser()"
                @mouseleave="if (!browserPinned && $event.clientX < window.innerWidth - 1) { showBrowser = false; browserMode = null }">

                <!-- Tab handle -->
                <div class="absolute top-1/2 -translate-y-1/2 w-5 h-14 bg-slate-700 border border-r-0 border-slate-600 rounded-l-lg flex items-center justify-center cursor-pointer opacity-95 z-10"
                    :style="`left: ${showBrowser ? 0 : 10}px`" aria-hidden="true">
                    <span class="text-slate-400 text-[10px] select-none" x-text="showBrowser ? '›' : '‹'"></span>
                </div>

                <!-- Drawer panel -->
                <div x-show="showBrowser" x-transition.opacity
                    class="absolute top-0 right-0 h-full flex flex-col bg-slate-700 shadow-2xl" style="width: 480px"
                    role="dialog" aria-modal="true" aria-labelledby="browser-drawer-title">

                    <!-- Drawer header -->
                    <div class="flex items-center gap-2 px-4 py-3 border-b border-slate-600 flex-shrink-0">
                        <button @click="browserPinned = !browserPinned"
                            :title="browserPinned ? 'Unpin panel' : 'Pin panel open'" :aria-pressed="browserPinned"
                            class="flex items-center justify-center w-6 h-6 rounded transition-colors"
                            :class="browserPinned ? 'text-indigo-400 bg-indigo-900/50 hover:bg-indigo-900' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-600'">
                            <span class="text-sm leading-none" x-text="browserPinned ? '📌' : '📍'"></span>
                        </button>
                        <span class="text-base" aria-hidden="true">📁</span>
                        <h2 id="browser-drawer-title" class="text-sm font-semibold"
                            x-text="browserMode === 'reference' ? 'Pick Reference Image' : 'Output Browser'"></h2>
                        <!-- Column selector — controls which column receives the picked image -->
                        <select x-show="browserMode !== 'reference'" :value="$store.activeColIdx"
                            @change="Alpine.store('activeColIdx', parseInt($event.target.value))"
                            class="text-xs px-2 py-0.5 rounded-full bg-indigo-900/60 text-indigo-300 border border-indigo-700 flex-1 cursor-pointer focus:outline-none focus:border-indigo-500">
                            <template x-for="i in Array.from({length: $store.columnCount}, (_, j) => j)" :key="i">
                                <option :value="i" :selected="i === $store.activeColIdx" x-text="`→ Design ${i + 1}`">
                                </option>
                            </template>
                        </select>
                        <button @click="toggleManageMode()" :aria-pressed="manageMode"
                            :title="manageMode ? 'Exit manage mode' : 'Enter manage mode to select, rename, or delete files'"
                            :class="manageMode ? 'bg-amber-500 text-white' : 'text-slate-400 hover:text-slate-200'"
                            class="text-xs font-medium px-2 py-1 rounded transition-colors"
                            x-text="manageMode ? 'Done' : 'Manage'"></button>
                        <button @click="reloadBrowser()" :disabled="browserLoading" aria-label="Refresh output browser"
                            title="Refresh"
                            class="text-slate-400 hover:text-slate-200 disabled:opacity-40 transition-colors text-xs px-1.5">↺</button>
                        <button @click="showBrowser = false; browserMode = null" aria-label="Close output browser"
                            title="Close"
                            class="text-slate-400 hover:text-slate-200 transition-colors text-lg leading-none">✕</button>
                    </div>

                    <!-- Storage stats bar -->
                    <div x-show="storageStats"
                        class="px-4 py-1.5 bg-slate-900/50 border-b border-slate-700 flex-shrink-0">
                        <p class="text-xs text-slate-500"
                            x-text="storageStats ? `${_fmtBytes(storageStats.totalBytes)} · ${storageStats.themeCount} theme${storageStats.themeCount !== 1 ? 's' : ''}` : ''">
                        </p>
                    </div>

                    <!-- Search -->
                    <div class="px-4 py-2 border-b border-slate-600 flex-shrink-0">
                        <input type="text" x-model="browserFilter" placeholder="Filter by theme…"
                            aria-label="Filter by theme"
                            class="w-full text-xs rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                    </div>

                    <!-- Content -->
                    <div class="flex-1 overflow-y-auto">

                        <!-- Loading -->
                        <div x-show="browserLoading" role="status" aria-live="polite"
                            class="flex items-center justify-center py-12 text-slate-400 text-sm gap-2">
                            <svg aria-hidden="true" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4" />
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                            </svg>
                            Loading…
                        </div>

                        <!-- Empty state -->
                        <div x-show="!browserLoading && filteredBrowserThemes.length === 0"
                            class="flex flex-col items-center justify-center py-12 text-slate-500 text-sm gap-1">
                            <span class="text-2xl">🗂</span>
                            <span x-text="browserFilter ? 'No matching themes' : 'No output yet'"></span>
                        </div>

                        <!-- Theme list -->
                        <template x-for="(theme, ti) in filteredBrowserThemes" :key="theme.theme">
                            <div class="border-b border-slate-700">

                                <!-- Theme header -->
                                <div class="flex items-center gap-1 px-3 py-2 hover:bg-slate-700 transition-colors">
                                    <input x-show="manageMode" type="checkbox" :checked="themeAllSelected(theme)"
                                        @change="toggleThemeFiles(theme)" class="flex-shrink-0 accent-indigo-500">
                                    <template x-if="manageMode && renamingDir === theme.dir_name">
                                        <div class="flex items-center gap-1 flex-1 min-w-0">
                                            <input type="text" x-model="renameValue" @keydown.enter="commitRename()"
                                                @keydown.escape="cancelRename()" x-init="$el.focus()"
                                                class="flex-1 text-xs rounded px-2 py-1 bg-slate-600 text-white focus:outline-none focus:ring-1 focus:ring-indigo-400 min-w-0">
                                            <button @click.stop="commitRename()" title="Save"
                                                class="flex-shrink-0 text-xs text-green-400 hover:text-green-200 px-1">✓</button>
                                            <button @click.stop="cancelRename()" title="Cancel"
                                                class="flex-shrink-0 text-xs text-slate-400 hover:text-slate-200 px-1">✕</button>
                                        </div>
                                    </template>
                                    <template x-if="!(manageMode && renamingDir === theme.dir_name)">
                                        <button @click="theme.expanded = !theme.expanded"
                                            :aria-expanded="theme.expanded"
                                            class="flex items-center gap-2 flex-1 text-left min-w-0">
                                            <span class="text-slate-400 text-xs w-3 flex-shrink-0" aria-hidden="true"
                                                x-text="theme.expanded ? '▼' : '▶'"></span>
                                            <span class="text-sm font-medium flex-1 truncate"
                                                x-text="theme.theme"></span>
                                            <span class="text-xs text-slate-500 flex-shrink-0"
                                                x-text="_fmtBytes(theme.theme_size_bytes)"></span>
                                        </button>
                                    </template>
                                    <button x-show="manageMode && renamingDir !== theme.dir_name"
                                        @click.stop="startRename(theme.dir_name, theme.theme)" title="Rename theme"
                                        class="flex-shrink-0 text-xs text-slate-500 hover:text-slate-200 px-1 transition-colors">✏</button>
                                    <button @click.stop="downloadThemeZip(theme.dir_name)" title="Download ZIP"
                                        class="flex-shrink-0 text-xs text-slate-500 hover:text-slate-200 px-1 transition-colors">⬇
                                        ZIP</button>
                                </div>

                                <div x-show="theme.expanded" class="px-4 pb-3 space-y-3">

                                    <!-- Finals -->
                                    <template x-if="theme.finals.length > 0">
                                        <div>
                                            <p
                                                class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
                                                Finals</p>
                                            <div class="grid grid-cols-3 gap-2">
                                                <template x-for="(f, fi) in theme.finals" :key="fi">
                                                    <div class="bg-slate-700 rounded-lg overflow-hidden relative group"
                                                        :class="isSelected(f.png_url) ? 'ring-2 ring-indigo-400' : ''"
                                                        @click="if (manageMode) toggleFile(f.png_url, f.png_size); else if (browserMode === 'reference') setReferenceFromBrowser(f.png_url)"
                                                        :style="(manageMode || browserMode === 'reference') ? 'cursor:pointer' : ''">
                                                        <!-- Manage-mode selection overlay -->
                                                        <div x-show="manageMode && isSelected(f.png_url)"
                                                            class="absolute inset-0 z-10 bg-indigo-500/30 flex items-center justify-center pointer-events-none">
                                                            <span
                                                                class="text-white text-3xl drop-shadow-lg font-bold">✓</span>
                                                        </div>
                                                        <img :src="f.png_url" alt=""
                                                            class="w-full aspect-square object-contain bg-slate-900 block">
                                                        <!-- Hover action overlay — hidden in manage/reference modes -->
                                                        <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none group-hover:pointer-events-auto bg-gradient-to-t from-slate-900/95 via-slate-900/50 to-transparent flex flex-col justify-end"
                                                            :class="(manageMode || browserMode === 'reference') ? '!opacity-0 !pointer-events-none' : ''">
                                                            <p class="text-[10px] text-slate-300 px-2 pt-1 leading-tight"
                                                                x-text="f.ts + ' · ' + f.width + '×' + f.height"></p>
                                                            <div class="flex gap-1.5 flex-wrap p-2 pt-1">
                                                                <a :href="f.png_url" download title="Download PNG"
                                                                    @click.stop
                                                                    class="text-xs px-1.5 py-0.5 rounded bg-slate-700/80 text-indigo-300 hover:bg-slate-600 transition-colors">⬇
                                                                    PNG</a>
                                                                <a x-show="f.md_url" :href="f.md_url" download
                                                                    title="Download metadata" @click.stop
                                                                    class="text-xs px-1.5 py-0.5 rounded bg-slate-700/80 text-slate-300 hover:bg-slate-600 transition-colors">📄
                                                                    MD</a>
                                                                <a x-show="f.no_bg_url" :href="f.no_bg_url" download
                                                                    title="Download no-background version" @click.stop
                                                                    class="text-xs px-1.5 py-0.5 rounded bg-slate-700/80 text-slate-300 hover:bg-slate-600 transition-colors">⬇
                                                                    No BG</a>
                                                                <button
                                                                    @click.stop="loadToVariants(f.png_url, f.width, f.height, theme.theme)"
                                                                    title="Load to active column"
                                                                    class="text-xs px-1.5 py-0.5 rounded bg-emerald-800/80 text-emerald-300 hover:bg-emerald-700 transition-colors">↑
                                                                    Load</button>
                                                                <button @click.stop="setReferenceFromBrowser(f.png_url)"
                                                                    title="Set as reference image"
                                                                    class="text-xs px-1.5 py-0.5 rounded bg-orange-800/80 text-orange-300 hover:bg-orange-700 transition-colors">🎯
                                                                    Ref</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Variants (flat — all concept subdirs merged, newest first) -->
                                    <template x-if="theme.images && theme.images.length > 0">
                                        <div>
                                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Variants</p>
                                            <div class="grid grid-cols-4 gap-1.5">
                                                <template x-for="(v, vi) in theme.images" :key="vi">
                                                    <!-- Wrapper owns popover state; closes on outside click or Escape -->
                                                    <div x-data="{ showDl: false }" class="relative"
                                                        @click.outside="showDl = false"
                                                        @keydown.escape.window="showDl = false">
                                                        <div class="bg-slate-700 rounded overflow-hidden relative group"
                                                            :class="isSelected(v.url) ? 'ring-2 ring-indigo-400' : ''"
                                                            @click="if (manageMode) toggleFile(v.url, v.size); else if (browserMode === 'reference') setReferenceFromBrowser(v.url)"
                                                            :style="(manageMode || browserMode === 'reference') ? 'cursor:pointer' : ''">
                                                            <!-- Manage-mode selection overlay -->
                                                            <div x-show="manageMode && isSelected(v.url)"
                                                                class="absolute inset-0 z-10 bg-indigo-500/30 flex items-center justify-center pointer-events-none">
                                                                <span class="text-white text-2xl drop-shadow-lg font-bold">✓</span>
                                                            </div>
                                                            <img :src="v.url" alt=""
                                                                class="w-full aspect-square object-contain bg-slate-900 block">
                                                            <!-- Hover action overlay — minimal: download, load, ref -->
                                                            <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none group-hover:pointer-events-auto bg-gradient-to-t from-slate-900/95 via-slate-900/50 to-transparent flex flex-col justify-end"
                                                                :class="(manageMode || browserMode === 'reference') ? '!opacity-0 !pointer-events-none' : ''">
                                                                <p class="text-[10px] text-slate-300 px-1.5 pt-1 leading-tight"
                                                                    x-text="v.width + '×' + v.height"></p>
                                                                <div class="flex gap-1 p-1.5 pt-0.5">
                                                                    <!-- Single render: ⬇ downloads directly; multiple: toggles popover -->
                                                                    <template x-if="(v.renders || []).length === 1">
                                                                        <a :href="(v.renders[0] || v).url" download
                                                                            @click.stop="$store.downloadedUrls[(v.renders[0] || v).url] = true"
                                                                            title="Download"
                                                                            class="text-xs px-1 py-0.5 rounded bg-slate-700/80 hover:bg-emerald-700 transition-colors"
                                                                            :class="$store.downloadedUrls[(v.renders[0] || v).url] ? 'text-slate-500' : 'text-emerald-300'">⬇</a>
                                                                    </template>
                                                                    <template x-if="(v.renders || []).length !== 1">
                                                                        <button @click.stop="showDl = !showDl"
                                                                            :class="showDl ? 'bg-emerald-700 text-white' : 'bg-slate-700/80 text-emerald-300 hover:bg-emerald-700'"
                                                                            title="Download renders"
                                                                            class="text-xs px-1 py-0.5 rounded transition-colors">⬇</button>
                                                                    </template>
                                                                    <button @click.stop="loadToVariants(v.url, v.width, v.height, theme.theme)"
                                                                        title="Load to active column"
                                                                        class="text-xs px-1 py-0.5 rounded bg-slate-700/80 text-emerald-300 hover:bg-emerald-700 transition-colors">↑</button>
                                                                    <button @click.stop="setReferenceFromBrowser(v.url)"
                                                                        title="Set as reference image"
                                                                        class="text-xs px-1 py-0.5 rounded bg-slate-700/80 text-orange-300 hover:bg-orange-700 transition-colors">🎯</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Download popover — stays open until Escape or outside click -->
                                                        <div x-show="showDl" x-cloak
                                                            class="absolute top-full left-0 mt-1 z-30 bg-slate-800 border border-slate-600 rounded-lg shadow-xl p-2 min-w-max">
                                                            <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Download</p>
                                                            <template x-for="(r, ri) in (v.renders || [])" :key="ri">
                                                                <div class="flex items-center gap-1 mb-1 last:mb-0">
                                                                    <a :href="r.url" download
                                                                        @click.stop="$store.downloadedUrls[r.url] = true"
                                                                        :title="'Download ' + r.ar + ' ' + r.res"
                                                                        class="text-xs px-1.5 py-0.5 rounded bg-slate-700 hover:bg-slate-600 transition-colors"
                                                                        :class="$store.downloadedUrls[r.url] ? 'text-slate-500 line-through' : 'text-indigo-300'"
                                                                        x-text="r.ar + ' · ' + r.res"></a>
                                                                    <a x-show="r.no_bg_url" :href="r.no_bg_url" download
                                                                        @click.stop="$store.downloadedUrls[r.no_bg_url] = true"
                                                                        :title="'No-bg ' + r.ar + ' ' + r.res"
                                                                        class="text-xs px-1.5 py-0.5 rounded bg-slate-700 hover:bg-slate-600 transition-colors"
                                                                        :class="$store.downloadedUrls[r.no_bg_url] ? 'text-slate-500 line-through' : 'text-slate-400'">no bg</a>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Manage-mode sticky footer -->
                    <div x-show="manageMode" class="flex-shrink-0 border-t border-slate-600 px-4 py-3 bg-slate-700">
                        <div x-show="selectedCount === 0" class="text-xs text-slate-500 text-center">
                            Click images or use theme checkboxes to select files
                        </div>
                        <div x-show="selectedCount > 0" class="flex items-center gap-2">
                            <span class="text-xs text-slate-400 flex-1"
                                x-text="`${selectedCount} file${selectedCount > 1 ? 's' : ''} · ${_fmtBytes(selectedBytes)}`"></span>
                            <button @click="downloadSelectedZip()" aria-label="Download selected files as ZIP"
                                title="Download selected as ZIP"
                                class="px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-white text-xs font-semibold rounded-lg transition-colors">⬇
                                ZIP</button>
                            <button @click="deleteSelected()" aria-label="Delete selected files"
                                title="Delete selected files (cannot be undone)"
                                class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white text-xs font-semibold rounded-lg transition-colors">
                                <span aria-hidden="true">🗑</span> Delete
                            </button>
                        </div>
                    </div>

                </div><!-- /drawer panel -->
            </div><!-- /browser wrapper -->

            <!-- ── Columns area ─────────────────────────────────────────────────── -->
            <div class="h-full flex flex-row overflow-x-auto overflow-y-hidden">

                <template x-for="col in columns" :key="col.id">
                    <!-- Each column is a fully independent Alpine component with its own workflow state -->
                    <div x-data="columnDesigner(col.id, sessionId, cfg, col.initialState || {})" :data-col-idx="col.id"
                        @click.capture="Alpine.store('activeColIdx', colIdx)"
                        class="min-w-[480px] flex-1 flex flex-col border-r border-slate-600 last:border-r-0 overflow-hidden bg-slate-800 relative">

                        <!-- Column header — highlighted when this column is the active browser target -->
                        <div class="border-b border-slate-600 px-3 py-2 flex items-center gap-2 flex-shrink-0 transition-colors"
                            :class="$store.browserOpen && $store.activeColIdx === colIdx
                                 ? 'bg-indigo-900/60 border-l-2 border-l-indigo-400'
                                 : 'bg-slate-700'">
                            <span class="text-sm font-semibold text-slate-200" x-text="`Design ${col.id + 1}`"></span>
                            <!-- Settings toggle -->
                            <button @click="settingsOpen = !settingsOpen" :aria-expanded="settingsOpen"
                                title="Toggle column settings"
                                class="flex items-center gap-1 px-2 py-1 text-xs rounded transition-colors"
                                :class="settingsOpen ? 'bg-indigo-700 text-white' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-600'">
                                <span aria-hidden="true">⚙️</span>
                                <span x-text="settingsOpen ? 'Hide Settings' : 'Settings'"></span>
                            </button>
                            <!-- Presets button — active when the presets panel is open -->
                            <button @click="openMyPresets()" title="Open prompt presets"
                                class="flex items-center gap-1 px-2 py-1 text-xs rounded transition-colors"
                                :class="$store.presetsOpen
                                    ? 'bg-indigo-700 text-white'
                                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-600'">
                                <span aria-hidden="true">🗂</span>
                            </button>
                            <!-- Output browser button — active state when this column is the current target -->
                            <button @click="openMyBrowser()" title="Open output browser"
                                class="flex items-center gap-1 px-2 py-1 text-xs rounded transition-colors" :class="$store.browserOpen && $store.activeColIdx === colIdx
                                    ? 'bg-indigo-700 text-white'
                                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-600'">
                                <span aria-hidden="true">📁</span>
                            </button>
                            <div class="flex-1"></div>
                            <!-- Close column button — disabled while loading or when it's the only column -->
                            <button @click="requestClose()" :disabled="isLoading || $store.columnCount <= 1"
                                title="Close column"
                                class="flex items-center justify-center w-6 h-6 text-sm rounded transition-colors"
                                :class="(isLoading || $store.columnCount <= 1)
                                    ? 'text-slate-600 cursor-not-allowed'
                                    : 'text-slate-400 hover:text-red-400 hover:bg-slate-600'">
                                ×
                            </button>
                        </div>

                        <!-- ── Per-column settings panel — absolute overlay so it floats over column content ── -->
                        <div x-show="settingsOpen" x-transition @click.outside="settingsOpen = false"
                            class="absolute inset-x-0 mx-auto top-[41px] z-20 w-4/5 max-w-sm bg-slate-700/90 border-b border-x border-slate-600 overflow-y-auto backdrop-blur-sm shadow-xl"
                            style="max-height: 60vh">
                            <div class="p-4 space-y-4">

                                <!-- Background Color -->
                                <div>
                                    <label :for="'bg-color-' + col.id"
                                        class="text-xs font-medium block mb-1.5">Background color</label>
                                    <p class="text-xs text-slate-300 mb-1">Default = <span
                                            @click="bgColor = '{{ bg_color }}'" title="Click to reset"
                                            class="underline cursor-pointer hover:text-white transition-colors">{{
                                            bg_color }} ({{ bg_color_name }})</span></p>
                                    <input :id="'bg-color-' + col.id" type="color" x-model="bgColor"
                                        aria-label="Background color"
                                        class="block w-full h-9 rounded-md border border-slate-500">
                                    <p class="text-xs text-slate-300 mt-1">Pick a solid color easy to remove in Canva.
                                    </p>
                                </div>

                                <!-- Sliders -->
                                <div class="space-y-3">
                                    <template x-for="slider in [
                                        { key: 'numVariants',   label: 'Number of variants',    min: 1, max: 5,   step: 1,  hint: '' },
                                        { key: 'bgTolerance',   label: 'BG removal tolerance',  min: 0, max: 128, step: 1,  hint: 'Higher = removes more color variation at edges.' },
                                        { key: 'decontaminate', label: 'Color spill removal',   min: 0, max: 100, step: 5,  hint: 'Reduces background hue bleed on edges.' },
                                        { key: 'edgeErode',     label: 'Edge shrink (px)',       min: 0, max: 5,   step: 1,  hint: 'Clips residual fringe by shrinking the alpha mask.' },
                                        { key: 'maxColors',     label: 'Max colors',            min: 1, max: 8,   step: 1,  hint: 'Applies to image generation.' }
                                    ]">
                                        <div>
                                            <div class="flex justify-between items-baseline mb-1">
                                                <label :for="'slider-' + col.id + '-' + slider.key"
                                                    class="text-xs font-medium" x-text="slider.label"></label>
                                                <span class="text-xs font-semibold text-indigo-300"
                                                    x-text="$data[slider.key]"
                                                    :aria-label="slider.label + ': ' + $data[slider.key]"></span>
                                            </div>
                                            <input type="range" :id="'slider-' + col.id + '-' + slider.key"
                                                :aria-label="slider.label" :min="slider.min" :max="slider.max"
                                                :step="slider.step" x-model.number="$data[slider.key]">
                                            <p x-show="slider.hint" x-text="slider.hint"
                                                class="text-xs text-slate-300 mt-0.5"></p>
                                        </div>
                                    </template>
                                </div>

                                <!-- Generation options -->
                                <div class="space-y-2">
                                    <div>
                                        <label :for="'aspect-ratio-' + col.id"
                                            class="text-xs font-medium block mb-1">Aspect ratio</label>
                                        <select :id="'aspect-ratio-' + col.id" x-model="aspectRatio"
                                            class="w-full text-xs border border-slate-500 rounded-md px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                            <template x-for="r in cfg.aspectRatios" :key="r">
                                                <option :value="r" x-text="r"></option>
                                            </template>
                                        </select>
                                    </div>
                                    <div>
                                        <label :for="'variant-size-' + col.id"
                                            class="text-xs font-medium block mb-1">Variant resolution</label>
                                        <select :id="'variant-size-' + col.id" x-model="variantSize"
                                            class="w-full text-xs border border-slate-500 rounded-md px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                            {% for s in brainstorm_sizes %}
                                            <option value="{{ s }}">{{ s }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <p class="text-xs text-slate-300">Output: <code
                                        class="bg-slate-600 px-1 rounded text-slate-200">{{ output_dir }}/</code></p>

                                <!-- Prompt Log — hidden for now -->
                                <div x-cloak class="hidden border border-slate-500 rounded-lg overflow-hidden">
                                    <button @click="showPromptLog = !showPromptLog" :aria-expanded="showPromptLog"
                                        class="w-full flex items-center justify-between px-3 py-2 text-xs font-medium text-white hover:bg-slate-600 transition-colors">
                                        <span><span aria-hidden="true">📋</span> Prompts sent to Gemini</span>
                                        <span class="text-slate-300 text-[10px]" aria-hidden="true"
                                            x-text="showPromptLog ? '▲' : '▼'"></span>
                                    </button>
                                    <div x-show="showPromptLog" x-transition>
                                        <textarea readonly :value="promptLog" rows="8"
                                            placeholder="Prompts appear here after generating variants."
                                            aria-label="Prompts sent to Gemini"
                                            class="w-full text-xs font-mono p-2 bg-slate-800 text-slate-100 border-t border-slate-500 resize-none focus:outline-none"></textarea>
                                    </div>
                                </div>


                            </div>
                        </div><!-- /settings panel -->

                        <!-- ── Workflow steps ──────────────────────────────────────── -->
                        <div class="flex-1 overflow-y-auto p-4 space-y-4">
                            <section class="rounded-xl p-4 space-y-4 transition-colors"
                                :class="$store.activeColIdx === colIdx ? 'bg-slate-600' : 'bg-slate-800'"
                                x-data="{ sCollapsed: {1: false, 2: false, 3: false, 4: false} }">
                                <div class="flex justify-end -mt-1 mb-1">
                                    <!-- Capture intent before loop to avoid mid-loop state drift. -->
                                    <button x-show="[1,2,3,4].filter(k => step >= k).some(k => !sCollapsed[k])"
                                        @click="[1,2,3,4].filter(k => step >= k).forEach(k => sCollapsed[k] = true)"
                                        class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-200 transition-colors">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
                                        Collapse all</button>
                                    <button x-show="[1,2,3,4].filter(k => step >= k).some(k => sCollapsed[k])"
                                        @click="[1,2,3,4].filter(k => step >= k).forEach(k => sCollapsed[k] = false)"
                                        class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-200 transition-colors ml-3">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                        Expand all</button>
                                </div>
                                <!-- Step 1: Theme -->
                                <section class="rounded-xl shadow-sm p-4">
                                    <div class="flex items-center justify-between mb-3">
                                        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-100">1 ·
                                            Enter a theme</h2>
                                        <button @click="sCollapsed[1] = !sCollapsed[1]" :aria-expanded="!sCollapsed[1]"
                                            class="text-slate-400 hover:text-slate-200 transition-colors p-0.5 rounded">
                                            <svg :class="sCollapsed[1] ? '-rotate-90' : ''"
                                                class="w-3.5 h-3.5 transition-transform" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </button>
                                    </div>
                                    <div x-show="!sCollapsed[1]">
                                        <!-- Theme textarea — full width -->
                                        <label :for="'theme-input-' + col.id" class="sr-only">Design theme</label>
                                        <textarea :id="'theme-input-' + col.id" x-model="theme" x-ref="themeInput"
                                            @keydown.enter.prevent="doBrainstorm()" @focus="$el.select()" rows="2"
                                            placeholder="e.g. vintage motorcycles, funny cats, 90s hip-hop..."
                                            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-2"></textarea>

                                        <!-- Action row: Brainstorm + Direct on left, reference image controls on right -->
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <!-- Generate buttons -->
                                            <button @click="doBrainstorm()" :disabled="isLoading || !theme.trim()"
                                                title="Create prompts from your theme"
                                                class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                                <svg x-show="isLoading && loadingStep === 1" aria-hidden="true"
                                                    class="animate-spin h-3 w-3 flex-shrink-0" fill="none"
                                                    viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4" />
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                </svg>
                                                <span aria-hidden="true">🧠</span> Brainstorm
                                            </button>
                                            <button @click="doGenerateDirect()" :disabled="isLoading || !theme.trim()"
                                                title="Generate image variants from prompt as is, skip the brainstorming"
                                                class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-400 text-white text-xs font-medium rounded-lg hover:bg-slate-400 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                                <span aria-hidden="true">🎨</span> Go Direct!
                                            </button>

                                            <div class="flex-1"></div>

                                            <!-- Reference image: Upload/Pick when unset, thumbnail + controls when set -->
                                            <div x-show="!refImageUrl" class="flex gap-2">
                                                <label :aria-label="'Upload reference image for Design ' + (col.id + 1)"
                                                    class="cursor-pointer flex items-center gap-1.5 px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-slate-100 text-xs font-medium rounded-lg transition-colors">
                                                    <span aria-hidden="true">⬆️</span> Upload
                                                    <input type="file" accept="image/*" class="hidden"
                                                        @change="setReferenceFromFile($event.target.files[0]); $event.target.value=''">
                                                </label>
                                                <button @click="openMyBrowserForRef()"
                                                    title="Pick reference image from output browser"
                                                    class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-slate-100 text-xs font-medium rounded-lg transition-colors">
                                                    <span aria-hidden="true">📁</span> Pick
                                                </button>
                                            </div>
                                            <div x-show="refImageUrl" class="flex items-center gap-2">
                                                <img :src="refImageUrl" alt="Reference image"
                                                    class="h-8 w-8 object-cover rounded border border-slate-500">
                                                <div class="grid grid-cols-2 rounded-lg overflow-hidden border border-slate-500 text-xs font-medium w-fit"
                                                    role="group" aria-label="Reference mode">
                                                    <button @click="referenceMode = 'style'"
                                                        :aria-pressed="referenceMode === 'style'"
                                                        title="Borrow color palette and aesthetic only"
                                                        :class="referenceMode === 'style' ? 'bg-indigo-600 text-white' : 'bg-slate-600 text-slate-300 hover:bg-slate-500'"
                                                        class="px-2.5 py-1 transition-colors">Style</button>
                                                    <button @click="referenceMode = 'copy'"
                                                        :aria-pressed="referenceMode === 'copy'"
                                                        title="Replicate layout and subject placement"
                                                        :class="referenceMode === 'copy' ? 'bg-indigo-600 text-white' : 'bg-slate-600 text-slate-300 hover:bg-slate-500'"
                                                        class="px-2.5 py-1 transition-colors">Copy</button>
                                                </div>
                                                <button @click="clearReference()" aria-label="Remove reference image"
                                                    title="Remove reference image"
                                                    class="text-xs text-slate-400 hover:text-red-400 transition-colors">✕</button>
                                            </div>
                                        </div>
                                        <!-- Status / error -->
                                        <div class="mt-3" x-show="loadingStep === 1 && (isLoading || error)">
                                            <div x-show="error" role="alert"
                                                class="flex items-start gap-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700">
                                                <span class="flex-shrink-0" aria-hidden="true">⚠️</span>
                                                <span x-text="error" class="flex-1"></span>
                                                <button @click="dismissError()" aria-label="Dismiss error"
                                                    class="text-red-400 hover:text-red-600 ml-2">✕</button>
                                            </div>
                                            <div x-show="isLoading" role="status" aria-live="polite"
                                                class="flex items-center gap-3 bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 text-sm text-indigo-700">
                                                <svg aria-hidden="true" class="animate-spin h-4 w-4 flex-shrink-0"
                                                    fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4" />
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                </svg>
                                                <span x-text="loadingMsg"></span>
                                            </div>
                                        </div>
                                    </div><!-- /collapse step 1 -->
                                </section>

                                <!-- Step 2: Pick a concept -->
                                <section x-show="step >= 2" x-transition
                                    class="rounded-xl shadow-sm p-4">
                                    <div class="flex items-center justify-between mb-3">
                                        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-100">2 ·
                                            Pick a concept</h2>
                                        <button @click="sCollapsed[2] = !sCollapsed[2]" :aria-expanded="!sCollapsed[2]"
                                            class="text-slate-400 hover:text-slate-200 transition-colors p-0.5 rounded">
                                            <svg :class="sCollapsed[2] ? '-rotate-90' : ''"
                                                class="w-3.5 h-3.5 transition-transform" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </button>
                                    </div>
                                    <div x-show="!sCollapsed[2]">
                                        <div x-show="!directMode" class="space-y-2">
                                            <template x-for="concept in concepts" :key="concept">
                                                <label
                                                    class="flex items-start gap-3 p-3 rounded-lg border cursor-pointer transition-colors"
                                                    :class="selectedConcept === concept
                                               ? 'border-indigo-400 bg-indigo-50'
                                               : 'bg-slate-100 border-slate-300 hover:bg-white hover:border-slate-400'">
                                                    <input type="radio" :name="'concept-' + col.id" :value="concept"
                                                        @change="selectConcept(concept)"
                                                        :checked="selectedConcept === concept"
                                                        class="mt-0.5 accent-indigo-600 flex-shrink-0">
                                                    <span x-text="concept"
                                                        class="text-sm text-slate-700 leading-snug"></span>
                                                </label>
                                            </template>
                                        </div>
                                        <div x-show="directMode"
                                            class="flex items-center gap-2 px-3 py-2 bg-slate-600 border border-slate-500 rounded-lg text-sm text-slate-300">
                                            <span>🎨</span>
                                            <span>Direct mode — generating from your prompt as-is.</span>
                                        </div>
                                    </div><!-- /collapse step 2 -->
                                </section>

                                <!-- Step 3: Refine & Generate -->
                                <section x-show="step >= 3" x-transition
                                    class="rounded-xl shadow-sm p-4">
                                    <div class="flex items-center justify-between mb-3">
                                        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-100">3 ·
                                            Refine &amp; generate</h2>
                                        <button @click="sCollapsed[3] = !sCollapsed[3]" :aria-expanded="!sCollapsed[3]"
                                            class="text-slate-400 hover:text-slate-200 transition-colors p-0.5 rounded">
                                            <svg :class="sCollapsed[3] ? '-rotate-90' : ''"
                                                class="w-3.5 h-3.5 transition-transform" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </button>
                                    </div>
                                    <div x-show="!sCollapsed[3]">
                                        <div class="space-y-3">
                                            <div>
                                                <label class="text-xs block mb-1">Edit concept (optional)</label>
                                                <textarea x-model="editedConcept" rows="2"
                                                    class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
                                            </div>
                                            <!-- Reference image (same controls as Step 1) -->
                                            <div>
                                                <label class="text-xs block mb-1">Reference image <span
                                                        class="text-slate-400">(optional)</span></label>
                                                <div x-show="!refImageUrl" class="flex gap-2">
                                                    <label
                                                        class="cursor-pointer flex items-center gap-1.5 px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-slate-100 text-xs font-medium rounded-lg transition-colors">
                                                        <span aria-hidden="true">🖼</span> Upload
                                                        <input type="file" accept="image/*" class="hidden"
                                                            @change="setReferenceFromFile($event.target.files[0]); $event.target.value=''">
                                                    </label>
                                                    <button @click="openMyBrowserForRef()"
                                                        title="Pick reference image from output browser"
                                                        class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-slate-100 text-xs font-medium rounded-lg transition-colors">
                                                        <span aria-hidden="true">📁</span> Pick
                                                    </button>
                                                </div>
                                                <div x-show="refImageUrl" class="flex items-center gap-2 flex-wrap">
                                                    <img :src="refImageUrl" alt="Reference image"
                                                        class="h-12 w-12 object-cover rounded-lg border border-slate-500">
                                                    <button @click="clearReference()"
                                                        aria-label="Remove reference image"
                                                        class="text-xs text-slate-400 hover:text-red-400 transition-colors">✕</button>
                                                    <div class="grid grid-cols-2 rounded-lg overflow-hidden border border-slate-500 text-xs font-medium w-fit"
                                                        role="group" aria-label="Reference mode">
                                                        <button @click="referenceMode = 'style'"
                                                            :aria-pressed="referenceMode === 'style'"
                                                            :class="referenceMode === 'style' ? 'bg-indigo-600 text-white' : 'bg-slate-600 text-slate-300 hover:bg-slate-500'"
                                                            class="px-2.5 py-1 transition-colors">Style</button>
                                                        <button @click="referenceMode = 'copy'"
                                                            :aria-pressed="referenceMode === 'copy'"
                                                            :class="referenceMode === 'copy' ? 'bg-indigo-600 text-white' : 'bg-slate-600 text-slate-300 hover:bg-slate-500'"
                                                            class="px-2.5 py-1 transition-colors">Copy</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="flex items-center gap-2 flex-wrap">
                                            <select x-model="aspectRatio"
                                                class="text-xs border border-slate-500 rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                                <template x-for="r in cfg.aspectRatios" :key="r">
                                                    <option :value="r" x-text="r"></option>
                                                </template>
                                            </select>
                                            <select x-model="variantSize"
                                                class="text-xs border border-slate-500 rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                                {% for s in brainstorm_sizes %}
                                                <option value="{{ s }}">{{ s }}</option>
                                                {% endfor %}
                                            </select>
                                            <!-- Variant count selector — mirrors the settings slider but inline for quick access -->
                                            <select x-model.number="numVariants"
                                                title="Number of variants to generate"
                                                class="text-xs border border-slate-500 rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-400 w-24">
                                                <template x-for="n in [1,2,3,4,5]" :key="n">
                                                    <option :value="n" x-text="n + (n === 1 ? ' variant' : ' variants')"></option>
                                                </template>
                                            </select>
                                            <button @click="doGenerate()" :disabled="isLoading"
                                                title="Generate image variants from the concept"
                                                class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                                <svg x-show="isLoading && step === 3 && variants.length === 0"
                                                    aria-hidden="true" class="animate-spin h-4 w-4 flex-shrink-0"
                                                    fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4" />
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                </svg>
                                                <span aria-hidden="true">🎨</span> <span
                                                    x-text="generateBtnLabel"></span>
                                            </button>
                                            </div>
                                        <div class="mt-3" x-show="loadingStep === 3 && (isLoading || error)">
                                            <div x-show="error" role="alert"
                                                class="flex items-start gap-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700">
                                                <span class="flex-shrink-0" aria-hidden="true">⚠️</span>
                                                <span x-text="error" class="flex-1"></span>
                                                <button @click="dismissError()"
                                                    class="text-red-400 hover:text-red-600 ml-2">✕</button>
                                            </div>
                                            <div x-show="isLoading" role="status" aria-live="polite"
                                                class="flex items-center gap-3 bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 text-sm text-indigo-700">
                                                <svg aria-hidden="true" class="animate-spin h-4 w-4 flex-shrink-0"
                                                    fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4" />
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                </svg>
                                                <span x-text="loadingMsg"></span>
                                            </div>
                                        </div>
                                    </div><!-- /collapse step 3 -->
                                </section>

                                <!-- Step 4: Gallery -->
                                <section x-show="step >= 4 || loadedImageRes" x-transition x-ref="step4"
                                    class="rounded-xl shadow-sm p-4">
                                    <div class="flex items-center justify-between mb-3">
                                        <h2 x-text="generatedVariantSize ? `4 · Variant Gallery (${generatedVariantSize} · ${generatedVariantAspectRatio})` : '4 · Variant Gallery'"
                                            class="text-xs font-semibold uppercase tracking-wider text-slate-100"></h2>
                                        <button @click="sCollapsed[4] = !sCollapsed[4]" :aria-expanded="!sCollapsed[4]"
                                            class="text-slate-400 hover:text-slate-200 transition-colors p-0.5 rounded">
                                            <svg :class="sCollapsed[4] ? '-rotate-90' : ''"
                                                class="w-3.5 h-3.5 transition-transform" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </button>
                                    </div>
                                    <div x-show="!sCollapsed[4]">
                                        <div x-show="loadedImageRes"
                                            class="mb-3 flex items-center gap-2 text-xs text-amber-300">
                                            <span>📁 Loaded from output browser</span>
                                            <span class="font-mono bg-slate-600 px-1.5 py-0.5 rounded"
                                                x-text="loadedImageRes ? loadedImageRes.width + '×' + loadedImageRes.height : ''"></span>
                                            <span class="text-slate-400">— finalize at higher resolution to
                                                upscale</span>
                                        </div>
                                        <div class="grid gap-2" :class="{
                                     'grid-cols-1 max-w-xs': variants.length === 1,
                                     'grid-cols-2': variants.length === 2,
                                     'grid-cols-3': variants.length === 3,
                                     'grid-cols-4': variants.length >= 4
                                 }">
                                            <template x-for="(v, i) in variants" :key="i">
                                                <div @click="selectedVariant = i" role="button" tabindex="0"
                                                    :aria-pressed="selectedVariant === i"
                                                    :aria-label="`Variant ${i + 1}${selectedVariant === i ? ', selected' : ', click to select'}`"
                                                    @keydown.enter.prevent="selectedVariant = i"
