                                                    @keydown.space.prevent="selectedVariant = i"
                                                    class="relative rounded-lg overflow-hidden cursor-pointer border-2 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-400"
                                                    :class="selectedVariant === i ? 'border-indigo-500 shadow-md' : 'border-slate-200 hover:border-slate-300'">
                                                    <img :src="v.url + '?t=' + v.ts" alt=""
                                                        class="w-full aspect-square object-contain bg-slate-100 block">
                                                    <div aria-hidden="true" x-show="selectedVariant === i"
                                                        class="absolute top-1.5 right-1.5 bg-indigo-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow">
                                                        ✓</div>
                                                    <span x-show="generatedVariantSize"
                                                        x-text="`${generatedVariantSize} ${generatedVariantAspectRatio}`"
                                                        aria-hidden="true"
                                                        class="absolute bottom-1.5 right-1.5 text-xs font-semibold text-white pointer-events-none"
                                                        style="text-shadow: 0 0 3px #000, 0 0 3px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000"></span>
                                                </div>
                                            </template>
                                        </div>
                                        <!-- ── Combo gallery for selected variant ────────────────── -->
                                        <div class="mt-4 space-y-3">
                                            <!-- Rendered combos for this variant — pills to select the active image -->
                                            <div x-show="(variantCombos[selectedVariant ?? 0] || []).length > 0"
                                                class="flex flex-wrap items-center gap-1.5">
                                                <span class="text-xs text-slate-400">Rendered combos:</span>
                                                <template x-for="c in (variantCombos[selectedVariant ?? 0] || [])"
                                                    :key="c.size + c.aspectRatio">
                                                    <button @click="selectCombo(c)"
                                                        :class="c.url === activeComboUrl ? 'bg-indigo-600 text-white' : 'bg-slate-600 hover:bg-slate-500 text-slate-200'"
                                                        class="text-xs px-2 py-0.5 rounded transition-colors"
                                                        x-text="`${c.size} · ${c.aspectRatio}`"></button>
                                                </template>
                                            </div>

                                            <!-- Active combo image + actions -->
                                            <div x-show="activeComboUrl" class="space-y-2">
                                                <!-- Wrap image in relative container so the label can be positioned over it -->
                                                <div class="relative inline-block max-w-xs w-full">
                                                    <img :src="activeComboUrl" alt="Active render"
                                                        class="w-full rounded-lg border border-slate-200 bg-slate-100 block">
                                                    <span x-show="activeComboSize"
                                                        x-text="`${activeComboSize} ${activeComboObj?.aspectRatio ?? ''}`"
                                                        class="absolute bottom-2 right-2 text-xs font-semibold text-white px-1.5 py-0.5 rounded pointer-events-none"
                                                        style="text-shadow: 0 0 3px #000, 0 0 3px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000"></span>
                                                </div>
                                                <div class="flex gap-2 flex-wrap items-center">
                                                    <a :href="activeComboUrl" download
                                                        :title="`Download ${activeComboSize} PNG`"
                                                        class="px-3 py-1.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 transition-colors"
                                                        x-text="`⬇ ${activeComboSize} PNG`"></a>
                                                    <button x-show="cfg.printifyEnabled" @click="openPrintify()"
                                                        :disabled="isLoading || (pNeedsUpscale && !pOverrideMinRes)"
                                                        x-text="(pNeedsUpscale && !pOverrideMinRes) ? `👕 ${cfg.printifyMinSize} Required` : pOverrideMinRes ? '👕 Printify (override)' : '👕 Printify'"
                                                        :class="pOverrideMinRes ? 'bg-red-600 hover:bg-red-700' : 'bg-emerald-600 hover:bg-emerald-700'"
                                                        class="px-3 py-1.5 text-white text-xs font-medium rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors"></button>
                                                </div>
                                            </div>

                                            <!-- Variant-level BG removal -->
                                            <div class="flex gap-2 flex-wrap items-center">
                                                <!-- Show Remove BG when active combo exists and bg hasn't been removed yet -->
                                                <button @click="doRemoveVariantBg()" :disabled="isLoading"
                                                    x-show="activeComboUrl && !activeComboObj?.origUrl"
                                                    aria-label="Remove background from rendered image"
                                                    class="px-3 py-1.5 bg-blue-400 text-white text-xs font-medium rounded-lg hover:bg-slate-400 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                                    <span aria-hidden="true">✂️</span> Remove BG
                                                </button>
                                                <!-- Show Undo BG when bg has been removed (origUrl is stored on the combo) -->
                                                <button @click="doRestoreVariantBg()" :disabled="isLoading"
                                                    x-show="activeComboUrl && activeComboObj?.origUrl"
                                                    aria-label="Restore original background"
                                                    class="px-3 py-1.5 bg-amber-600 text-white text-xs font-medium rounded-lg hover:bg-amber-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                                    <span aria-hidden="true">↩</span> Undo BG
                                                </button>
                                            </div>

                                            <!-- Render new combo controls -->
                                            <div class="flex gap-2 flex-wrap items-center border-t border-slate-600 pt-3">
                                                <span class="text-xs text-slate-400">Render new combo:</span>
                                                <select x-model="aspectRatio"
                                                    class="text-xs border border-slate-500 rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                                    <template x-for="r in cfg.aspectRatios" :key="r">
                                                        <option :value="r" x-text="r"></option>
                                                    </template>
                                                </select>
                                                <select @change="renderSize = $event.target.value"
                                                    class="text-xs border border-slate-500 rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                                    <template x-for="s in cfg.finalSizes" :key="s">
                                                        <option :value="s" :selected="s === renderSize"
                                                            :disabled="(variantCombos[selectedVariant ?? 0] || []).some(c => c.size === s && c.aspectRatio === aspectRatio)"
                                                            x-text="(variantCombos[selectedVariant ?? 0] || []).some(c => c.size === s && c.aspectRatio === aspectRatio) ? s + ' ✓' : s">
                                                        </option>
                                                    </template>
                                                </select>
                                                <button @click="doRender()"
                                                    :disabled="isLoading || (variantCombos[selectedVariant ?? 0] || []).some(c => c.size === renderSize && c.aspectRatio === aspectRatio)"
                                                    :title="(variantCombos[selectedVariant ?? 0] || []).some(c => c.size === renderSize && c.aspectRatio === aspectRatio)
                                                        ? 'Already rendered — click the pill above to select it'
                                                        : `Render at ${renderSize} · ${aspectRatio}`"
                                                    x-text="(variantCombos[selectedVariant ?? 0] || []).some(c => c.size === renderSize && c.aspectRatio === aspectRatio)
                                                        ? `✨ ${renderSize} · ${aspectRatio} — already rendered`
                                                        : `✨ Render at ${renderSize}`"
                                                    class="flex items-center gap-2 px-3 py-1.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"></button>
                                            </div>

                                            <div x-show="cfg.printifyEnabled">
                                                <label class="flex items-center gap-2 cursor-pointer select-none w-fit">
                                                    <input type="checkbox" x-model="pOverrideMinRes" class="rounded">
                                                    <span class="text-xs text-slate-400">Override <span
                                                            x-text="cfg.printifyMinSize"></span> minimum (testing only)</span>
                                                </label>
                                            </div>
                                        </div>
                                        <div class="mt-3" x-show="loadingStep === 4 && (isLoading || error)">
                                            <div x-show="error" role="alert"
                                                class="flex items-start gap-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700">
                                                <span class="flex-shrink-0" aria-hidden="true">⚠️</span>
                                                <span x-text="error" class="flex-1"></span>
                                                <button @click="dismissError()"
                                                    class="text-red-400 hover:text-red-600 ml-2">✕</button>
                                            </div>
                                            <div x-show="isLoading" role="status" aria-live="polite"
                                                class="flex items-center gap-3 bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 text-sm text-indigo-700">
                                                <svg aria-hidden="true" class="animate-spin h-4 w-4 flex-shrink-0"
                                                    fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4" />
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                </svg>
                                                <span x-text="loadingMsg"></span>
                                            </div>
                                        </div>
                                    </div><!-- /collapse step 4 -->
                                </section>

                            </section>
                        </div><!-- /workflow steps -->

                        <!-- ── Printify modal — teleported to <body> to escape overflow clipping,
                             but stays inside this column's Alpine scope so it reads column state.  -->
                        <template x-teleport="body">
                            <div x-show="showPrintify" x-cloak role="dialog" aria-modal="true"
                                class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4"
                                @keydown.escape.window="showPrintify = false">
                                <div
                                    class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col text-slate-800">

                                    <!-- Modal header -->
                                    <div
                                        class="flex justify-between items-center px-6 py-4 border-b border-slate-200 flex-shrink-0">
                                        <h2 class="text-base font-semibold"><span aria-hidden="true">👕</span> Publish
                                            to Printify
                                            <span class="text-xs font-normal text-slate-400 ml-1"
                                                x-text="`— Design ${col.id + 1}`"></span>
                                        </h2>
                                        <button @click="showPrintify = false" aria-label="Close" title="Close (Esc)"
                                            class="text-slate-400 hover:text-slate-600 text-xl leading-none">✕</button>
                                    </div>

                                    <!-- Modal body (scrollable) -->
                                    <div class="overflow-y-auto flex-1 px-6 py-5 space-y-5">

                                        <!-- Resolution upgrade banner -->
                                        <div x-show="pNeedsUpscale && !pOverrideMinRes"
                                            class="rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
                                            <span class="text-amber-500 text-lg flex-shrink-0">⚠️</span>
                                            <div class="flex-1 min-w-0">
                                                <p class="text-sm font-medium text-amber-800">
                                                    Design is at <span x-text="activeComboSize || 'low res'"></span> — Printify
                                                    requires <span x-text="cfg.printifyMinSize"></span>.
                                                </p>
                                                <p class="text-xs text-amber-600 mt-0.5">Render at a higher resolution before publishing.</p>
                                            </div>
                                            <button @click="doRenderForPrintify()" :disabled="printifyBusy"
                                                class="flex-shrink-0 px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                                Render at <span x-text="cfg.printifyMinSize"></span>
                                            </button>
                                        </div>

                                        <!-- Shop selector -->
                                        <div x-show="!cfg.printifyShopId">
                                            <label for="printify-shop"
                                                class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Shop</label>
                                            <select id="printify-shop" x-model="pShopId"
                                                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                                <option value="" disabled>Select a shop…</option>
                                                <template x-for="s in pShops" :key="s.id">
                                                    <option :value="s.id" x-text="s.title"></option>
                                                </template>
                                            </select>
                                        </div>

                                        <!-- Blueprint search -->
                                        <div>
                                            <label for="blueprint-search"
                                                class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">T-Shirt
                                                Style</label>
                                            <input id="blueprint-search" type="text" x-model="pBlueprintSearch"
                                                @input="filterBlueprints()"
                                                placeholder="Search styles… (e.g. Bella+Canvas, Gildan)"
                                                autocomplete="off"
                                                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-2">
                                            <div x-show="pFilteredBlueprints.length > 0" role="listbox"
                                                class="border border-slate-200 rounded-lg overflow-hidden max-h-44 overflow-y-auto">
                                                <template x-for="bp in pFilteredBlueprints" :key="bp.id">
                                                    <div @click="selectBlueprint(bp)" role="option" tabindex="0"
                                                        :aria-selected="pBlueprint?.id === bp.id"
                                                        @keydown.enter.prevent="selectBlueprint(bp)"
                                                        class="px-3 py-2 text-sm cursor-pointer transition-colors focus:outline-none focus:bg-indigo-50"
                                                        :class="pBlueprint?.id === bp.id ? 'bg-indigo-600 text-white' : 'hover:bg-slate-50 border-t border-slate-100 first:border-0'">
                                                        <span class="font-medium" x-text="bp.title"></span>
                                                        <span class="text-xs ml-1 opacity-60"
                                                            x-text="bp.brand ? '· ' + bp.brand : ''"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <p x-show="pBlueprintSearch && pFilteredBlueprints.length === 0"
                                                class="text-xs text-slate-400 mt-1">No matches. Try a different search.
                                            </p>
                                        </div>

                                        <!-- Print provider -->
                                        <div x-show="pProviders.length > 0">
                                            <label for="print-provider"
                                                class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Print
                                                Provider</label>
                                            <select id="print-provider" x-model="pProviderId" @change="loadVariants()"
                                                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                                <template x-for="p in pProviders" :key="p.id">
                                                    <option :value="p.id"
                                                        x-text="p.title + (p.location?.country ? ' · ' + p.location.country : '')">
                                                    </option>
                                                </template>
                                            </select>
                                        </div>

                                        <!-- Color picker -->
                                        <div x-show="pColors.length > 0">
                                            <div class="flex items-baseline justify-between mb-1.5">
                                                <label class="text-xs font-semibold uppercase tracking-wider"
                                                    :class="pSelectedColors.length === 0 ? 'text-red-500' : 'text-slate-500'"
                                                    x-text="pSelectedColors.length === 0 ? 'Select at least one color:' : 'Colors'"></label>
                                                <div class="flex gap-2">
                                                    <button @click="pSelectedColors = [...pColors]"
                                                        class="text-xs text-indigo-500 hover:text-indigo-700">Select
                                                        all</button>
                                                    <span class="text-slate-300" aria-hidden="true">·</span>
                                                    <button @click="pSelectedColors = []"
                                                        class="text-xs text-indigo-500 hover:text-indigo-700">Deselect
                                                        all</button>
                                                </div>
                                            </div>
                                            <div class="flex flex-wrap gap-1.5" role="group" aria-label="Colors">
                                                <template x-for="color in pColors" :key="color">
                                                    <button @click="togglePColor(color)"
                                                        :aria-pressed="pSelectedColors.includes(color)"
                                                        class="px-2.5 py-1 text-xs rounded-full border transition-colors"
                                                        :class="pSelectedColors.includes(color) ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-300 text-slate-600 hover:border-indigo-400'"
                                                        x-text="color"></button>
                                                </template>
                                            </div>
                                        </div>

                                        <!-- Size picker -->
                                        <div x-show="pSizes.length > 0">
                                            <div class="flex items-baseline justify-between mb-1.5">
                                                <label
                                                    class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Sizes</label>
                                                <div class="flex gap-2">
                                                    <button @click="pSelectedSizes = [...pSizes]"
                                                        class="text-xs text-indigo-500 hover:text-indigo-700">Select
                                                        all</button>
                                                    <span class="text-slate-300" aria-hidden="true">·</span>
                                                    <button @click="pSelectedSizes = []"
                                                        class="text-xs text-indigo-500 hover:text-indigo-700">Deselect
                                                        all</button>
                                                </div>
                                            </div>
                                            <div class="flex flex-wrap gap-1.5" role="group" aria-label="Sizes">
                                                <template x-for="size in pSizes" :key="size">
                                                    <button @click="togglePSize(size)"
                                                        :aria-pressed="pSelectedSizes.includes(size)"
                                                        class="px-3 py-1 text-xs rounded-full border font-medium transition-colors"
                                                        :class="pSelectedSizes.includes(size) ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-300 text-slate-600 hover:border-indigo-400'"
                                                        x-text="size"></button>
                                                </template>
                                            </div>
                                            <p class="text-xs text-slate-400 mt-1.5"
                                                x-text="selectedVariantCount + ' variant' + (selectedVariantCount === 1 ? '' : 's') + ' selected'">
                                            </p>
                                        </div>

                                        <!-- Design placement -->
                                        <div x-show="pSizes.length > 0">
                                            <div class="flex gap-5 items-start">
                                                <div class="flex-1 space-y-3">
                                                    <!-- Preset + allowance -->
                                                    <div>
                                                        <label
                                                            class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Vertical
                                                            Preset</label>
                                                        <div class="flex items-center gap-2">
                                                            <button @click="applyTopPreset()"
                                                                :aria-pressed="pIsTopPreset"
                                                                :class="pIsTopPreset ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-300 text-slate-700 hover:border-indigo-400'"
                                                                class="flex-1 px-3 py-1.5 text-sm font-medium rounded-lg border transition-colors">Align
                                                                to Top</button>
                                                            <div class="flex items-center gap-1">
                                                                <span class="text-xs text-slate-400"
                                                                    aria-hidden="true">+</span>
                                                                <input type="number" x-model.number="pTopAllowance"
                                                                    min="0" max="300" step="1"
                                                                    aria-label="Top gap in pixels"
                                                                    @input="if (pIsTopPreset && pPrintWidth) applyTopPreset()"
                                                                    class="w-16 border border-slate-300 rounded-lg px-2 py-1.5 text-sm text-center focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                                                <span class="text-xs text-slate-400">px</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <!-- Scale -->
                                                    <div>
                                                        <div class="flex justify-between items-baseline mb-1.5">
                                                            <label for="design-scale"
                                                                class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Design
                                                                Size</label>
                                                            <span class="text-xs font-semibold text-indigo-500"
                                                                x-text="Math.round(pScale * 100) + '%'"></span>
                                                        </div>
                                                        <input id="design-scale" type="range" min="0.4" max="1.0"
                                                            step="0.05" x-model.number="pScale" class="w-full">
                                                    </div>
                                                    <!-- X/Y position -->
                                                    <div x-show="pPrintWidth && pPrintHeight" class="space-y-2">
                                                        <label
                                                            class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Position
                                                            (px)</label>
                                                        <div>
                                                            <div class="flex justify-between items-baseline mb-0.5">
                                                                <label for="pos-x-range"
                                                                    class="text-xs text-slate-400">X — left edge</label>
                                                                <button @click="centerH()"
                                                                    class="text-xs text-indigo-500 hover:text-indigo-700 font-medium">Center</button>
                                                            </div>
                                                            <div class="flex gap-2 items-center">
                                                                <input id="pos-x-range" type="range"
                                                                    x-model.number="pXPx"
                                                                    :min="-Math.round(pScale * pPrintWidth)"
                                                                    :max="pPrintWidth" step="1"
                                                                    @input="pIsTopPreset = false" @dblclick="centerH()"
                                                                    class="flex-1">
                                                                <input type="number" x-model.number="pXPx"
                                                                    :min="-Math.round(pScale * pPrintWidth)"
                                                                    :max="pPrintWidth" step="1"
                                                                    @input="pIsTopPreset = false"
                                                                    class="w-20 border border-slate-300 rounded-lg px-2 py-1 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <div class="flex justify-between items-baseline mb-0.5">
                                                                <label for="pos-y-range"
                                                                    class="text-xs text-slate-400">Y — top edge</label>
                                                                <button @click="centerV()"
                                                                    class="text-xs text-indigo-500 hover:text-indigo-700 font-medium">Center</button>
                                                            </div>
                                                            <div class="flex gap-2 items-center">
                                                                <input id="pos-y-range" type="range"
                                                                    x-model.number="pYPx"
                                                                    :min="-Math.round(pScale * pPrintWidth)"
                                                                    :max="pPrintHeight" step="1"
                                                                    @input="pIsTopPreset = false" @dblclick="centerV()"
                                                                    class="flex-1">
                                                                <input type="number" x-model.number="pYPx"
                                                                    :min="-Math.round(pScale * pPrintWidth)"
                                                                    :max="pPrintHeight" step="1"
                                                                    @input="pIsTopPreset = false"
                                                                    class="w-20 border border-slate-300 rounded-lg px-2 py-1 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                                            </div>
                                                        </div>
                                                        <p class="text-xs text-slate-400"
                                                            x-text="'Print area: ' + pPrintWidth + ' × ' + pPrintHeight + ' px'">
                                                        </p>
                                                    </div>
                                                </div>

                                                <!-- Live placement preview -->
                                                <div x-show="(activeComboUrl || selectedVariantObj?.url) && pPrintWidth && pPrintHeight"
                                                    class="flex-shrink-0">
                                                    <label
                                                        class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Preview</label>
                                                    <div class="relative overflow-hidden rounded border border-slate-300 bg-slate-100 select-none"
                                                        :style="{ width: '220px', height: Math.round(220 * pPrintHeight / pPrintWidth) + 'px' }">
                                                        <div class="absolute inset-x-0 top-1/2 border-dashed transition-all duration-75"
                                                            :class="(pPrintHeight && Math.abs(pYPx + pScale*pPrintWidth/2 - pPrintHeight/2) <= 5)
                                                                     ? 'border-t-2 border-red-500 opacity-90'
                                                                     : pDrag ? 'border-t border-slate-400 opacity-50' : 'opacity-0'">
                                                        </div>
                                                        <div class="absolute inset-y-0 left-1/2 border-dashed transition-all duration-75"
                                                            :class="(pPrintWidth && Math.abs(pXPx + pScale*pPrintWidth/2 - pPrintWidth/2) <= 5)
                                                                     ? 'border-l-2 border-red-500 opacity-90'
                                                                     : pDrag ? 'border-l border-slate-400 opacity-50' : 'opacity-0'">
                                                        </div>
                                                        <img :src="(activeComboUrl || selectedVariantObj?.url) ? (activeComboUrl || selectedVariantObj?.url) : ''"
                                                            alt="Design placement preview" tabindex="0"
                                                            title="Drag to reposition — or use arrow keys (Shift for 10px steps)"
                                                            @mousedown.prevent="startDrag($event)"
                                                            @keydown.arrow-left.prevent="nudgeDrag(-1, 0)"
                                                            @keydown.arrow-right.prevent="nudgeDrag(1, 0)"
                                                            @keydown.arrow-up.prevent="nudgeDrag(0, -1)"
                                                            @keydown.arrow-down.prevent="nudgeDrag(0, 1)"
                                                            @keydown.shift.arrow-left.prevent="nudgeDrag(-10, 0)"
                                                            @keydown.shift.arrow-right.prevent="nudgeDrag(10, 0)"
                                                            @keydown.shift.arrow-up.prevent="nudgeDrag(0, -10)"
                                                            @keydown.shift.arrow-down.prevent="nudgeDrag(0, 10)" :style="{
                                                                 position: 'absolute',
                                                                 width: Math.round(pScale * 220) + 'px',
                                                                 left: Math.round(pXPx * 220 / pPrintWidth) + 'px',
                                                                 top: Math.round(pYPx * 220 / pPrintWidth) + 'px',
                                                                 cursor: pDrag ? 'grabbing' : 'grab',
                                                             }">
                                                    </div>
                                                    <p :class="pImageOutOfBounds ? 'visible' : 'invisible'" role="alert"
                                                        class="mt-1.5 text-xs font-semibold text-red-600">
                                                        <span aria-hidden="true">⚠</span> Image outside of print area!
                                                    </p>
                                                </div>

                                            </div>
                                        </div>

                                        <!-- Product details -->
                                        <div x-show="pSizes.length > 0" class="space-y-3">
                                            <div>
                                                <label for="product-title"
                                                    class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Product
                                                    Title</label>
                                                <input id="product-title" type="text" x-model="pTitle"
                                                    class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                            </div>
                                            <div>
                                                <label for="product-description"
                                                    class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Description
                                                    <span
                                                        class="normal-case font-normal text-slate-400">(optional)</span></label>
                                                <textarea id="product-description" x-model="pDescription" rows="2"
                                                    class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
                                            </div>
                                            <div>
                                                <label for="product-price"
                                                    class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Retail
                                                    Price (USD)</label>
                                                <div class="relative">
                                                    <span
                                                        class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                                                        aria-hidden="true">$</span>
                                                    <input id="product-price" type="number" x-model="pPrice" min="0.01"
                                                        step="0.01"
                                                        class="w-full border border-slate-300 rounded-lg pl-7 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                                                </div>
                                            </div>
                                        </div>

                                    </div>

                                    <!-- Modal footer -->
                                    <div class="border-t border-slate-200 flex-shrink-0">
                                        <div x-show="printifyError || printifyStatus || printifyDone"
                                            class="px-6 pt-4 space-y-2">
                                            <div x-show="printifyError" role="alert"
                                                class="flex items-start gap-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700">
                                                <span class="flex-shrink-0" aria-hidden="true">⚠️</span>
                                                <span x-text="printifyError" class="flex-1"></span>
                                                <button @click="printifyError = ''"
                                                    class="text-red-400 hover:text-red-600 ml-2">✕</button>
                                            </div>
                                            <div x-show="printifyStatus && !printifyError" role="status"
                                                aria-live="polite"
                                                class="flex items-center gap-3 bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 text-sm text-indigo-700">
                                                <svg aria-hidden="true" class="animate-spin h-4 w-4 flex-shrink-0"
                                                    fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4" />
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                </svg>
                                                <span x-text="printifyStatus"></span>
                                            </div>
                                            <div x-show="printifyDone" role="status" aria-live="polite"
                                                class="bg-emerald-50 border border-emerald-200 rounded-lg px-4 py-3 text-sm text-emerald-700 space-y-1">
                                                <p class="font-semibold"><span aria-hidden="true">✅</span> <span
                                                        x-text="printifyDone?.published ? 'Published!' : 'Draft saved!'"></span>
                                                </p>
                                                <a :href="printifyDone?.product_url" target="_blank"
                                                    class="underline text-emerald-600 hover:text-emerald-800">Open in
                                                    Printify →</a>
                                            </div>
                                        </div>
                                        <div x-show="pSizes.length > 0" class="flex gap-3 px-6 py-4">
                                            <button @click="doPublish(false)"
                                                :disabled="printifyBusy || selectedVariantCount === 0 || (pNeedsUpscale && !pOverrideMinRes)"
                                                :class="pOverrideMinRes ? 'bg-red-100 text-red-700 hover:bg-red-200' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'"
                                                class="flex-1 px-4 py-2 text-sm font-medium rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                                x-text="(pNeedsUpscale && !pOverrideMinRes) ? `${cfg.printifyMinSize} Required` : pSelectedColors.length === 0 ? 'Select Color First' : pOverrideMinRes ? 'Save as Draft (override)' : 'Save as Draft'"></button>
                                            <button @click="doPublish(true)"
                                                :disabled="printifyBusy || selectedVariantCount === 0 || (pNeedsUpscale && !pOverrideMinRes)"
                                                :class="pOverrideMinRes ? 'bg-red-600 hover:bg-red-700' : 'bg-emerald-600 hover:bg-emerald-700'"
                                                class="flex-1 px-4 py-2 text-white text-sm font-medium rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                                x-text="(pNeedsUpscale && !pOverrideMinRes) ? `${cfg.printifyMinSize} Required` : pSelectedColors.length === 0 ? 'Select Color First' : pOverrideMinRes ? 'Publish to Store (override)' : 'Publish to Store'"></button>
                                        </div>
                                    </div>

                                </div><!-- /modal inner -->
                            </div><!-- /modal dialog -->
                        </template><!-- /x-teleport -->

                    </div><!-- /column -->
                </template><!-- /x-for columns -->


            </div><!-- /columns area -->

        </div><!-- /body relative wrapper -->

    </div><!-- /h-screen -->

    <!-- Server-injected config — type=application/json prevents JS formatter from mangling Jinja2 tags -->
    <script type="application/json" id="app-config">
        {
            "numVariants": {{ num_variants }},
            "bgColor": {{ bg_color | tojson }},
            "bgTolerance": {{ bg_tolerance }},
            "edgeErode": {{ edge_erode }},
            "decontaminate": {{ decontaminate }},
            "maxColors": {{ max_colors }},
            "presetNames": {{ preset_names | tojson }},
            "builtinName": {{ builtin_name | tojson }},
            "allPresets": {{ all_presets | tojson }},
            "conceptsTemplate": {{ concepts_template | tojson }},
            "variantsTemplate": {{ variants_template | tojson }},
            "styleTemplate": {{ style_template | tojson }},
            "printifyEnabled": {{ printify_enabled | tojson }},
            "printifyShopId": {{ printify_shop_id | tojson }},
            "printifyShopName": {{ printify_shop_name | tojson }},
            "printifyMinSize": {{ printify_min_size | tojson }},
            "sizePx": {{ size_px | tojson }},
            "aspectRatios": {{ aspect_ratios | tojson }},
            "defaultAspectRatio": {{ default_aspect_ratio | tojson }},
            "brainstormSizes": {{ brainstorm_sizes | tojson }},
            "defaultVariantSize": {{ brainstorm_size | tojson }},
            "finalSizes": {{ final_sizes | tojson }},
            "defaultFinalSize": {{ final_size | tojson }},
            "maxColumns": {{ max_columns }}
        }
    </script>
    <script src="/static/app.js"></script>

</body>

</html>
